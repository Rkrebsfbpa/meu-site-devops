<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roberto Krebs</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background-color: #333;
            margin-bottom: 16px;
            object-fit: cover;
            border: 2px solid #00fff2;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #a0a0a0;
            margin: 0 0 32px 0;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            padding: 16px;
            background-color: #1e1e1e;
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid #333;
            transition: all 0.2s ease-in-out;
        }

        .link-btn:hover {
            background-color: #ffffff;
            color: #121212;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">

        <img class="profile-img" src="Roberto.png" alt="Foto de Roberto Krebs">

        <h1>Roberto Krebs</h1>
        <p>Estudante de Tecnologia</p>

        <div class="links-wrapper">
            <a class="link-btn" href="https://www.linkedin.com/in/roberto-krebs-694824355" target="_blank">💼 LinkedIn</a>

    </div>

</body>
</html>
